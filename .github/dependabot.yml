version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - rust

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - python

  - package-ecosystem: pip
    directory: /services/agent
    schedule:
      interval: weekly
    labels:
      - dependencies
      - python

  - package-ecosystem: pip
    directory: /services/agent_mcp
    schedule:
      interval: weekly
    labels:
      - dependencies
      - python

  - package-ecosystem: pip
    directory: /docs
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docs

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    labels:
      - dependencies
      - web

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
